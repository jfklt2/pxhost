apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "34.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      enabled: false  # We create our own Gateway
    gatewayClass:
      enabled: true
    ports:
      websecure:
        transport:
          respondingTimeouts:
            readTimeout: "0"
            idleTimeout: "0"
      otel:
        port: 4317
        expose:
          default: true
        exposedPort: 4317
        protocol: TCP
