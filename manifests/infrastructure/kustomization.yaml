apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces
  - namespace.yaml
  - traefik-namespace.yaml
  - cert-manager-namespace.yaml
  # Flux Helm
  - helm/traefik.yaml
  - helm/cert-manager.yaml
  - helm/clickhouse-operator.yaml
  # Dashboards (loaded by Grafana sidecar via grafana_dashboard=1 label)
  - dashboards/redpanda-operations.yaml
  - dashboards/redpanda-consumer-offsets.yaml
