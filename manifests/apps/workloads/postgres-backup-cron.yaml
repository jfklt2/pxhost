apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup-cron
  namespace: monitoring
spec:
  schedule: "0 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pg-backup
              image: postgres:17-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: postgres
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  value: postgres
                - name: PGDATABASE
                  value: postgres
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: clickhouse-backup-s3
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: clickhouse-backup-s3
                      key: secret-key
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: region
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: endpoint
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: bucket
                - name: S3_FORCE_PATH_STYLE
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: force-path-style
                      optional: true
                - name: ROOT_DOMAIN
                  value: "${ROOT_DOMAIN}"
              command:
                - sh
                - -ec
                - |
                  apk add --no-cache aws-cli

                  if [[ "${S3_FORCE_PATH_STYLE:-false}" == "true" ]]; then
                    aws configure set default.s3.addressing_style path
                  fi

                  RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)"
                  KEY="postgres-backups/${ROOT_DOMAIN}/postgres-${RUN_ID}.dump"
                  echo "Backing up to s3://${S3_BUCKET}/${KEY}"

                  pg_dump -Fc | aws s3 cp - "s3://${S3_BUCKET}/${KEY}"
                  echo "Backup complete: s3://${S3_BUCKET}/${KEY}"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
