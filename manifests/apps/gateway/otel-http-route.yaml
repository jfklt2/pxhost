apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otel-http-route
  namespace: monitoring
spec:
  parentRefs:
    - name: observability-gateway
      sectionName: https-otel
  hostnames:
    - "otel.${ROOT_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: otel-collector
          port: 4318
