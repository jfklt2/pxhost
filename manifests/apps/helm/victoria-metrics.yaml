apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.26.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  values:
    server:
      # Use simple name for service (victoria-metrics-server)
      fullnameOverride: victoria-metrics

      # Convert OTEL metrics to Prometheus naming conventions
      extraArgs:
        opentelemetry.usePrometheusNaming: "true"
      # Persistence
      persistentVolume:
        enabled: true
        size: 10Gi

      # Retention period (1 month)
      retentionPeriod: 1

      # Service config (ClusterIP for internal access)
      service:
        type: ClusterIP
        servicePort: 8428

      # Disable built-in scraping (we use OTEL)
      scrape:
        enabled: false

      # Resources (fixed)
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 512Mi
