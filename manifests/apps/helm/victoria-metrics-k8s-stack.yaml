apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.77.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  values:
    # Reuse the existing victoria-metrics-single + grafana + alertmanager(none).
    vmsingle:
      enabled: false
    vmcluster:
      enabled: false
    alertmanager:
      enabled: false
    vmalert:
      enabled: false
    grafana:
      enabled: false
      forceDeployDatasource: false
    defaultRules:
      create: false

    # Dashboards as ConfigMaps; chart labels them grafana_dashboard=1
    # which our existing Grafana sidecar already picks up.
    # The annotation nests them under "infra/k8s" in Grafana.
    defaultDashboards:
      enabled: true
      annotations:
        grafana_folder: infra/k8s

    # vmagent scrapes cluster + remote-writes to the existing VictoriaMetrics.
    vmagent:
      enabled: true
      spec:
        port: "8429"
        selectAllByDefault: true
        scrapeInterval: 30s
        extraArgs:
          promscrape.streamParse: "true"
      additionalRemoteWrites:
        - url: http://victoria-metrics:8428/api/v1/write

    # Exporters bundled by the chart.
    kube-state-metrics:
      enabled: true
    prometheus-node-exporter:
      enabled: true
    kubelet:
      enabled: true

    # k3s embeds these in the server process; not separately scrapable.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    coreDns:
      enabled: false
